services:
  - type: web
    name: ai-sinmungo-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_NAME
        value: gpt-4o-mini
      - key: DATABASE_URL
        value: sqlite:///./data/app.db
      - key: DEBUG
        value: "false"
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
